services:
  app:
    build: .
    container_name: gpt_image_studio_app
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - ./public:/app/public
      - ./data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
    restart: always

  mysql:
    image: mysql:8.0
    container_name: gpt_image_studio_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    restart: always

volumes:
  mysql_data: